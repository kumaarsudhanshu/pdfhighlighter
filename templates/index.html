<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Number Highlighter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    /* Fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #ffecd2 0%, #fcb69f 100%);
      margin: 0;
      padding: 0;
      animation: fadeIn 1s ease-out;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      background-color: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
      color: #333;
      position: relative;
    }

    h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 4px;
      background-color: #ff6f61;
      margin: 8px auto 0;
      border-radius: 2px;
      animation: fadeIn 0.5s ease;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #444;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 2px solid #ddd;
      border-radius: 10px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    input[type="file"]:focus,
    input[type="text"]:focus {
      border-color: #ff6f61;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, #ff6f61, #ff9966);
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      margin-top: 20px;
      cursor: pointer;
      transition: transform 0.2s, background 0.4s;
    }

    button:hover {
      transform: scale(1.03);
      background: linear-gradient(45deg, #ff5e57, #ff8c42);
    }

    .footer {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
      animation: fadeIn 1s ease;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🔍 PDF Number Highlighter</h2>
    <form method="post" enctype="multipart/form-data">
      <label>Select PDF File:</label>
      <input type="file" name="pdf" accept=".pdf" required>

      <label>Numbers to highlight (comma separated):</label>
      <input type="text" name="numbers" placeholder="e.g., 123, 456, 789" required>

      <button type="submit">Highlight & Download</button>
    </form>
    <div class="footer">Website is Designed By Sudhanshu Kumar for <b>Mr. RAVI PRAKASH</b></div>
  </div>

</body>
</html>
