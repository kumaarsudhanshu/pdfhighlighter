<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Highlighted PDF Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
    }

    .match-bar {
      background: #ffffff;
      padding: 20px;
      border-bottom: 2px solid #e0e0e0;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .match-bar h2 {
      margin-top: 0;
      font-size: 22px;
      color: #333;
    }

    .match-list {
      list-style: none;
      padding-left: 0;
      margin: 10px 0 0 0;
    }

    .match-list li {
      padding: 8px 12px;
      background: #fefefe;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin: 6px 0;
      font-size: 16px;
      color: #444;
      transition: background 0.3s ease;
    }

    .match-list li:hover {
      background: #f0f8ff;
    }

    .match-list strong {
      color: #2a6fdb;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
    }

    .no-match {
      color: #777;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="match-bar">
    <h2>📄 Matched Results</h2>
    {% if matches %}
      <ul class="match-list">
        {% for number, page in matches %}
          <li>✅ <strong>{{ number }}</strong> found on <strong>page {{ page }}</strong></li>
        {% endfor %}
      </ul>
    {% else %}
      <p class="no-match">❌ No matches found in the document.</p>
    {% endif %}
  </div>

  <iframe src="{{ url_for('view_file', filename=filename) }}"></iframe>

</body>
</html>
