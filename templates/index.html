<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PDF Number Highlighter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-color: #eef3f7;
      --container-bg: #ffffff;
      --text-color: #1f2d3d;
      --input-bg: #f5fafd;
      --border: #cfdbe8;
      --button-gradient: linear-gradient(135deg, #43cea2, #185a9d);
    }

    body.dark-mode {
      --bg-color: #121721;
      --container-bg: #1e1e2e;
      --text-color: #e5e5f0;
      --input-bg: #2b2b3d;
      --border: #444;
      --button-gradient: linear-gradient(135deg, #7f6cff, #c88fff);
    }

    * {
      transition: background-color 0.4s ease, color 0.4s ease, border 0.3s ease;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .container {
      width: 100%;
      max-width: 460px;
      background-color: var(--container-bg);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      position: relative;
    }

    .dark-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      border-radius: 34px;
      transition: background-color 0.4s ease;
    }

    .slider:before {
      position: absolute;
      content: "☀️";
      height: 22px;
      width: 22px;
      left: 2px;
      bottom: 2px;
      background-color: #fff;
      color: #f39c12;
      font-size: 14px;
      line-height: 22px;
      text-align: center;
      border-radius: 50%;
      transition: transform 0.4s ease, content 0.4s ease;
    }

    input:checked + .slider {
      background-color: #6a5acd;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
      content: "🌙";
      color: #f1c40f;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 24px;
    }

    label {
      display: block;
      margin: 18px 0 6px;
      font-weight: 500;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text-color);
    }

    input[type="file"]::file-selector-button {
      padding: 6px 12px;
      background: var(--button-gradient);
      color: #fff;
      border: none;
      border-radius: 8px;
      margin-right: 10px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: var(--button-gradient);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(67, 206, 162, 0.3);
      transition: transform 0.2s ease, background 0.3s ease;
    }

    button[type="submit"]:hover {
      transform: scale(1.03);
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 13px;
      color: #777;
    }

    body.dark-mode .footer {
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="dark-toggle">
      <label class="switch">
        <input type="checkbox" onchange="toggleMode()" />
        <span class="slider"></span>
      </label>
    </div>

    <h2>🔍 PDF Number Highlighter</h2>

    <form method="POST" enctype="multipart/form-data">
      <label>Select PDF File:</label>
      <input type="file" name="pdf" accept=".pdf" required>

      <label>Numbers/Text to highlight (comma separated):</label>
      <input type="text" name="numbers" placeholder="e.g. 123, SUDHANSHU, 3276/2025" required>

      <button type="submit"> Highlight & Download</button>
    </form>

    <div class="footer">
      &copy; 2025 <b>Sudhanshu Kumar</b> | Built for <b>Mr. Ravi Prakash</b>
    </div>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
    }
  </script>

</body>
</html>
